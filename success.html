<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement confirme</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f6f0e9;color:#2f2621;padding:20px}
    .card{width:min(92vw,620px);background:#fff;border:1px solid #e7dbcf;border-radius:14px;padding:24px}
    h1{margin:0 0 10px;font-size:30px}
    p{margin:0 0 12px;color:#5f5148}
    .code{margin:14px 0;padding:12px;border-radius:10px;background:#f8f3ed;border:1px dashed #cdb8a7;font-size:26px;font-weight:700;letter-spacing:.06em}
    .muted{font-size:13px;color:#796b61}
    .btn{display:inline-block;margin-top:14px;text-decoration:none;background:#2f6f7f;color:#fff;padding:10px 14px;border-radius:10px}
  </style>
<style data-global-dotted-bg-v1="1">
body {
  background:
    radial-gradient(circle at 12% 8%, rgba(226, 186, 83, 0.18) 0, rgba(226, 186, 83, 0.18) 2px, transparent 3px) 0 0 / 22px 22px,
    #ffffff !important;
}
</style><style data-brand-typography-v1="1">:root{--bs-font-main:"Inter","Avenir Next","Segoe UI",Arial,sans-serif;--bs-font-title:"Segoe Script","Lucida Handwriting","Brush Script MT","Segoe Print",cursive;}body,.page,.sans,.serif,.to-do-children-checked,.to-do-children-unchecked,p,li,blockquote,td,th,input,textarea,button,select,label{font-family:var(--bs-font-main)!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}h1,h2,h3,h4,h5,h6,.page-title{font-family:var(--bs-font-title)!important;font-weight:800;letter-spacing:.01em;line-height:1.18;}p,li,blockquote,td,th{line-height:1.58;}textarea.brand-zone-block,textarea.brand-zone,span.brand-zone-inline{font-family:var(--bs-font-main)!important;line-height:1.58;}</style><script data-text-spacing-v1="1">(function(){function skip(node){if(!node||!node.parentElement)return true;var p=node.parentElement;var tag=p.tagName;return tag==="SCRIPT"||tag==="STYLE"||tag==="TEXTAREA"||tag==="INPUT"||tag==="CODE"||tag==="PRE";}function normalize(txt){if(!txt)return txt;return txt.replace(/\u00A0/g," ").replace(/[ \t]{2,}/g," ").replace(/ +([:;!?])/g," $1");}window.addEventListener("DOMContentLoaded",function(){var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null);var n;while((n=w.nextNode())){if(skip(n))continue;var t=n.nodeValue;var x=normalize(t);if(x!==t)n.nodeValue=x;}});})();</script></head>
<body>
  <main class="card">
    <h1>Paiement confirmé</h1>
    <p>Ton accès est en cours de création.</p>
    <div id="code" class="code">Génération du code...</div>
    <p class="muted">Conserve ce code, il te servira pour te connecter à la formation.</p>
    <a class="btn" href="index.html">Retour à la connexion</a>
  </main>

  <script>
    async function run() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const codeEl = document.getElementById("code");

      if (!sessionId) {
        codeEl.textContent = "Session introuvable";
        return;
      }

      try {
        const res = await fetch("/api/issue-access-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId })
        });

        const json = await res.json();
        if (!res.ok || !json.code) {
          const parts = [];
          if (json && json.error) parts.push(json.error);
          if (json && json.details) parts.push(json.details);
          const detail = parts.length ? `: ${parts.join(" - ")}` : "";
          codeEl.textContent = "Erreur de génération" + detail;
          return;
        }

        codeEl.textContent = json.code;
      } catch (e) {
        codeEl.textContent = "Erreur réseau";
      }
    }

    run();
  </script>
</body>
</html>
